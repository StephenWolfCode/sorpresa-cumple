<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sorpresa 🎂</title>
  <style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function abrir() {
  document.getElementById("contenido").style.display = "block";

  confetti({
    particleCount: 150,
    spread: 100,
    origin: { y: 0.6 }
  });
}
</script>
    body {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      text-align: center;
      color: #333;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 50px;
      font-size: 40px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      background-color: #ff6b6b;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff4b4b;
    }

    #contenido {
      display: none;
      margin-top: 30px;
    }

    img {
      width: 250px;
      margin: 10px;
      border-radius: 15px;
    }

    #mensaje {
      font-size: 22px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Hola mi amor tengo una sorpresita para vos🎁</h1>
  <button onclick="mostrarTodo()">Abrir sorpresa</button>

  <div id="contenido">
    <h2> Feliz Cumpleaños mi amor🎉 Lamento no poder estar con vos,
 pero quiero que sepas que te extraño y te recuerdo cada segundo de mi vida💕💕</h2>

    <!-- Música -->
    <audio id="musica" loop>
      <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <!-- Fotos -->
    <div>
      <img src="foto1.jpg">
      <img src="foto2.jpg">
      <img src="foto3.jpg">
    </div>

    <!-- Mensaje -->
    <p id="mensaje"></p>

    <button onclick="mensajeSecreto()">Mensaje secreto 💌</button>
  </div>

  <script>
    function mostrarTodo() {
      document.getElementById("contenido").style.display = "block";
      document.getElementById("musica").play();
    }

    function mensajeSecreto() {
      document.getElementById("mensaje").innerHTML =
        "De verdad, sofia, gracias por todo, gracias por ser quien sos y por como sos conmigo, por todo lo que haces por mi, y por aguantarme a pesar de todo💖 Sos lo mejor que me pasó en toda mi vida, y tenes que saber que te amo y te voy a seguir amando con todo lo que hay en mi, durante todo el tiempo que mi corazon aguante, y de ser posible aún más. Feliz Cumpleaños, ojala podamos seguir muchos años mas juntos, mi corazón, mi amor, mi novia...💫";
  }
  </script>

</body>
</html>
